services:
  postgres:
    image: postgres:15
    container_name: nifty100_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nifty100
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./django_app
      dockerfile: Dockerfile
    container_name: nifty100_django
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nifty100
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./django_app:/app


volumes:
  postgres_data: